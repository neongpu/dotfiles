# Riced Hyprlock Example

general {
    hide_cursor = true
    grace = 5
    fade_in = 0.3
    fade_out = 0.3
}

background {
    path = ~/wallpapers/wallpaper1.jpg
    blur_passes = 6
    color = rgba(10, 10, 15, 0.7)
}

label {
    text = $TIME
    font_size = 120
    font_color = rgba(255, 255, 255, 0.9)
    position = 0, -100
    halign = center
    valign = center
}

label {
    text = $DATE
    font_size = 40
    font_color = rgba(200, 200, 255, 0.7)
    position = 0, 50
    halign = center
    valign = center
}

input-field {
    size = 320, 70
    outline_thickness = 3
    outline_color = rgba(255, 255, 255, 0.5)
    dots_size = 0.25
    dots_spacing = 0.3
    dots_color = rgba(0, 255, 200, 0.8)
    placeholder_text = <i>Enter password...</i>
    fail_text = <i>Wrong! ($ATTEMPTS)</i>
    fail_color = rgba(255, 50, 50, 0.9)
    success_color = rgba(50, 255, 100, 0.9)
    border_radius = 20
    padding = 15
}